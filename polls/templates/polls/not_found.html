{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Found</title>
    <link rel="stylesheet" href="{% static 'polls/style.css' %}">
</head>
<body>
    <main>
        {% if user.is_authenticated %}
            <p>Logged in as <strong>{{ user.username }}</strong> | <a href="{% url 'polls:logout' %}">Log out</a></p>
        {% endif %}
        <h1>Not Found</h1>
        <p>The question you're looking for doesn't exist or you don't have permission to view it.</p>
        <a href="{% url 'polls:index' %}">&larr; Back to polls</a>
    </main>
</body>
</html>
